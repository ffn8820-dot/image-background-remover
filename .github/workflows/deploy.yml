name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --registry https://registry.npmjs.org

      - name: Build
        run: yarn build

      - name: Remove cache (Cloudflare 25MB limit)
        run: rm -rf .next/dev/cache || true

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .next --project-name image-background-remover --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
